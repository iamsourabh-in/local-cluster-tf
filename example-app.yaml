apiVersion: v1
kind: Namespace
metadata:
  name: example-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: example-app
  labels:
    app: example-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
      - name: python-app
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Installing dependencies..."
            pip install --no-cache-dir opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp requests
            
            echo "Creating application script..."
            cat << 'EOF' > app.py
            from http.server import BaseHTTPRequestHandler, HTTPServer
            import time
            import logging
            import requests
            from opentelemetry import trace
            from opentelemetry.sdk.trace import TracerProvider
            from opentelemetry.sdk.trace.export import BatchSpanProcessor
            from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter

            # Configure OpenTelemetry Tracing
            trace.set_tracer_provider(TracerProvider())
            otlp_exporter = OTLPSpanExporter(endpoint="opentelemetry-collector.monitoring.svc.cluster.local:4317", insecure=True)
            trace.get_tracer_provider().add_span_processor(BatchSpanProcessor(otlp_exporter))
            tracer = trace.get_tracer(__name__)

            # Configure Logging
            logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(name)s - %(message)s')
            logger = logging.getLogger("example-app")

            class ServerHandler(BaseHTTPRequestHandler):
                def do_GET(self):
                    with tracer.start_as_current_span("http-request-received") as span:
                        span.set_attribute("http.method", "GET")
                        span.set_attribute("http.path", self.path)
                        
                        logger.info(f"Handling GET request for: {self.path}")
                        
                        # Simulate database call
                        with tracer.start_as_current_span("simulated-db-query"):
                            logger.info("Performing database query...")
                            time.sleep(0.05) # simulate 50ms database delay
                        
                        # Simulate call to external HTTP service
                        with tracer.start_as_current_span("external-api-call"):
                            try:
                                logger.info("Calling external API httpbin.org...")
                                res = requests.get("https://httpbin.org/get", timeout=3)
                                logger.info(f"External API responded with status {res.status_code}")
                            except Exception as err:
                                logger.error(f"External API call failed: {err}")
                        
                        self.send_response(200)
                        self.send_header("Content-Type", "text/html")
                        self.end_headers()
                        
                        html_response = f"""
                        <html>
                          <head>
                            <title>OTel Instrumented App</title>
                            <style>
                              body {{ font-family: sans-serif; background: #0f172a; color: #f1f5f9; padding: 2rem; }}
                              .card {{ background: #1e293b; border-radius: 8px; padding: 1.5rem; border: 1px solid #334155; }}
                              h1 {{ color: #38bdf8; }}
                              code {{ background: #020617; padding: 0.2rem 0.4rem; border-radius: 4px; color: #fb7185; }}
                            </style>
                          </head>
                          <body>
                            <div class="card">
                              <h1>Success!</h1>
                              <p>The OTel instrumented Python web server has processed your request successfully.</p>
                              <p>Spans have been sent to <code>opentelemetry-collector.monitoring.svc.cluster.local:4317</code>.</p>
                              <p>Logs have been printed to stdout/stderr and collected by Promtail into Loki.</p>
                            </div>
                          </body>
                        </html>
                        """
                        self.wfile.write(html_response.encode('utf-8'))
                        logger.info("Request completed successfully.")

            def run():
                server_address = ('', 8080)
                httpd = HTTPServer(server_address, ServerHandler)
                logger.info("Web server listening on port 8080...")
                httpd.serve_forever()

            if __name__ == '__main__':
                run()
            EOF
            
            echo "Running application..."
            python app.py
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: example-app
  namespace: example-app
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: example-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-app
  namespace: example-app
  annotations:
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - example-app.local
    secretName: example-app-tls
  rules:
  - host: example-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: example-app
            port:
              number: 80
